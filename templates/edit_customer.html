{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">Edit Customer</h2>

    <div class="row g-3">

        <!-- 🔹 Edit Form -->
        <div class="col-md-6">
            <div class="card p-4 shadow-sm" style="border-radius: 12px;">
                
                <h5 class="mb-3">Customer Details</h5>

                <form method="POST">

                    <div class="mb-3">
                        <input type="text" name="name" class="form-control"
                               value="{{ customer['name'] }}" placeholder="Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control"
                               value="{{ customer['email'] }}" placeholder="Email" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="phone" class="form-control"
                               value="{{ customer['phone'] }}" placeholder="Phone">
                    </div>

                    <div class="mb-3">
                        <input type="text" name="company" class="form-control"
                               value="{{ customer['company'] }}" placeholder="Company">
                    </div>

                    <div class="mb-3">
                        <textarea name="notes" class="form-control" rows="3"
                                  placeholder="Notes">{{ customer['notes'] }}</textarea>
                    </div>

                    <div class="mb-3">
                        <select name="status" class="form-select">
                            <option value="Lead" {% if customer['status'] == 'Lead' %}selected{% endif %}>Lead</option>
                            <option value="Contacted" {% if customer['status'] == 'Contacted' %}selected{% endif %}>Contacted</option>
                            <option value="Converted" {% if customer['status'] == 'Converted' %}selected{% endif %}>Converted</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary">Update</button>
                        <a href="/customers" class="btn btn-secondary">Back</a>
                    </div>

                </form>

            </div>
        </div>

        <!-- 🔹 Notes Section -->
        <div class="col-md-6">
            <div class="card p-4 shadow-sm" style="border-radius: 12px;">
                
                <h5 class="mb-3">Customer Notes</h5>

                <form method="POST" action="/add_note/{{ customer['id'] }}">
                    <textarea name="content" class="form-control mb-2"
                              placeholder="Add note..." rows="2"></textarea>
                    <button class="btn btn-success mb-3">Add Note</button>
                </form>

                {% if notes %}
                    <div class="list-group">
                        {% for note in notes %}
                            <div class="list-group-item">
                                <div>{{ note['content'] }}</div>
                                <small class="text-muted">{{ note['created_at'] }}</small>
                            </div>
                        {% endfor %}
                    </div>
                {% else %}
                    <p class="text-muted">No notes yet.</p>
                {% endif %}

            </div>
        </div>

    </div>

</div>

{% endblock %}
