{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Add Customer</h2>

    <!-- 🔹 Upload Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="mb-3">
                <i class="bi bi-upload"></i> Bulk Upload (CSV / Excel)
            </h5>

            <form action="/upload_customers" method="POST" enctype="multipart/form-data" class="row g-3">

                <div class="col-md-8">
                    <input type="file" name="file" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <button class="btn btn-success w-100">
                        <i class="bi bi-cloud-upload"></i> Upload File
                    </button>
                </div>

            </form>

            <div class="mt-2">
                <a href="{{ url_for('download_template') }}" class="text-decoration-none small">
                    Download sample template
                </a>
            </div>
        </div>
    </div>

    <!-- 🔹 Manual Entry Card -->
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="mb-3">
                <i class="bi bi-person-plus"></i> Add Customer Manually
            </h5>

            <form method="POST" class="row g-3">

                <div class="col-md-6">
                    <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                </div>

                <div class="col-md-6">
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>

                <div class="col-md-6">
                    <input type="text" name="phone" class="form-control" placeholder="Phone">
                </div>

                <div class="col-md-6">
                    <input type="text" name="company" class="form-control" placeholder="Company">
                </div>

                <div class="col-md-6">
                    <select name="status" class="form-select">
                        <option value="Lead">Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Converted">Converted</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <textarea name="notes" class="form-control" rows="3" placeholder="Notes"></textarea>
                </div>

                <!-- Buttons -->
                <div class="col-md-12 d-flex gap-2 mt-2">
                    <button class="btn btn-primary">
                        <i class="bi bi-save"></i> Save Customer
                    </button>

                    <a href="/customers" class="btn btn-secondary">
                        Back
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
