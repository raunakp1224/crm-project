{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">

        <div class="card text-center p-5 shadow-sm" style="max-width: 500px; border-radius: 12px;">

            <h2 class="mb-3">Welcome to CRM</h2>
            <p class="text-muted mb-4">
                Manage your customers, track interactions, and grow your business efficiently.
            </p>

            {% if session.get('user') %}

                <div class="d-flex justify-content-center gap-2">
                    <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
                    <a href="/customers" class="btn btn-secondary">View Customers</a>
                </div>

            {% else %}

                <div class="d-flex justify-content-center gap-2">
                    <a href="/login" class="btn btn-primary">Login</a>
                    <a href="/signup" class="btn btn-success">Signup</a>
                </div>

            {% endif %}

        </div>

    </div>

</div>

{% endblock %}
